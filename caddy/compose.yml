
services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/somehow22/caddy:${VERSION:-latest}
    restart: unless-stopped
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    sysctls:
      net.core.rmem_max: 2500000
      net.core.wmem_max: 2500000
    ports:
      - "80:18080/tcp"
      - "443:18443/tcp"
      # If you enabled h3 in Caddyfile's 'servers { protocols h1 h2 h3 }'
      - "443:18443/udp"
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "/usr/bin/caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data: {}
  caddy_config: {}
