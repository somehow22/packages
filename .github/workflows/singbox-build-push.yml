name: Build and Push Sing-box V2Ray API Image

on:
  push:
    branches: [ main ]
    paths:
      - 'singbox/**'
      - '.github/workflows/singbox-build-push.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'singbox/**'
      - '.github/workflows/singbox-build-push.yml'
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:
    inputs:
      sing_box_version:
        description: 'sing-box git tag or latest'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/singbox

concurrency:
  group: singbox-v2ray-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.sing_box_version || 'latest' }}
        run: |
          set -euo pipefail
          requested="${REQUESTED_VERSION:-latest}"
          if [ "$requested" = "latest" ]; then
            version="$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')"
          else
            version="$requested"
          fi
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not resolve sing-box version" >&2
            exit 1
          fi
          tags="${REGISTRY}/${IMAGE_NAME}:${version}-v2ray-api"
          tags="${tags}"$'\n'"${REGISTRY}/${IMAGE_NAME}:${version}-v2ray-api-${GITHUB_SHA::12}"
          if [ "$requested" = "latest" ]; then
            tags="${tags}"$'\n'"${REGISTRY}/${IMAGE_NAME}:latest-v2ray-api"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${REGISTRY}/${IMAGE_NAME}:${version}-v2ray-api" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${REGISTRY}/${IMAGE_NAME}:${version}-v2ray-api-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./singbox
          file: ./singbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SING_BOX_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Summary
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          {
            echo "### Published sing-box v2ray-API image"
            echo
            echo "- ${{ steps.meta.outputs.tag_version }}"
            echo "- ${{ steps.meta.outputs.tag_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
