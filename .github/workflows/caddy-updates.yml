name: Caddy Updates

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: caddy-updates
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          current="$(grep -E '^ARG CADDY_VERSION=' caddy/Dockerfile | head -1 | cut -d '=' -f2)"
          latest="$(curl -fsSL https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r .tag_name | sed 's/^v//')"
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Caddy version
        if: steps.versions.outputs.update_available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s/^ARG CADDY_VERSION=.*/ARG CADDY_VERSION=${{ steps.versions.outputs.latest }}/" caddy/Dockerfile

      - name: Create pull request
        if: steps.versions.outputs.update_available == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: maintenance/caddy-version
          delete-branch: true
          commit-message: "chore(caddy): update to ${{ steps.versions.outputs.latest }}"
          title: "chore(caddy): update to ${{ steps.versions.outputs.latest }}"
          body: |
            Updates Caddy from `${{ steps.versions.outputs.current }}` to `${{ steps.versions.outputs.latest }}`.

            The CI workflow builds the image before merge. Publishing is handled by the manual `Release Images` workflow.
