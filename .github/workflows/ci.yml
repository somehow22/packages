name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "caddy/**"
      - "katbin/**"
      - "singbox/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "caddy/**"
      - "katbin/**"
      - "singbox/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

jobs:
  docker:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: caddy
            context: ./caddy
            file: ./caddy/Dockerfile
          - image: katbin
            context: ./katbin
            file: ./katbin/Dockerfile
          - image: singbox
            context: ./singbox
            file: ./singbox/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Resolve build args
        id: args
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.image }}" in
            caddy)
              caddy_version="$(grep -E '^ARG CADDY_VERSION=' caddy/Dockerfile | head -1 | cut -d '=' -f2)"
              printf 'build_args<<EOF\nCADDY_VERSION=%s\nEOF\n' "$caddy_version" >> "$GITHUB_OUTPUT"
              ;;
            singbox)
              sing_box_version="$(grep -E '^ARG SING_BOX_VERSION=' singbox/Dockerfile | head -1 | cut -d '=' -f2)"
              printf 'build_args<<EOF\nSING_BOX_VERSION=%s\nEOF\n' "$sing_box_version" >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf 'build_args=\n' >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          build-args: ${{ steps.args.outputs.build_args }}
