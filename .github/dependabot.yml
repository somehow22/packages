version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/caddy"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    groups:
      caddy-image:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/katbin"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    groups:
      katbin-image:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/singbox"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    groups:
      singbox-image:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
